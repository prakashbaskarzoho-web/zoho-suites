{{ define "main"}}
  <div class="hero">
    <div class="hero-content">
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
    </div>
    {{ with .Params.image }}
      <img src="{{ . | absURL }}" alt="{{ $.Title }}" width="300px">
    {{ end }}
  </div>

  <div class="suits">
    <article class="content">
      {{ .Content }}
    </article>
  </div>
{{end}}
