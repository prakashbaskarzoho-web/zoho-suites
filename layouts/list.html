{{ define "main"}}
    <div class="suits">
    <h1>Welcome to {{ .Title }}</h1>
    <div class="cards">
        {{range .Data.Pages}}
        <div class="card">
            <div class="card-title">
                <img src="{{ .Params.image | absURL }}" alt="{{ .Title }}">
                <h2>{{ .Title }}</h2>
            </div>
            <p>{{ .Params.description }}</p>
            <a href="{{ .Permalink }}">Read more</a>
        </div>
        {{end}}
    </div>
    </div>
{{end}}
